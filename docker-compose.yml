services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ccuss_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - ccuss_network

  nginx:
    image: nginx:latest
    container_name: ccuss_nginx_webserver
    restart: unless-stopped
    ports:
      - '8000:80'
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ccuss_network

  node:
    image: node:20
    container_name: ccuss_node_service
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: sh -c "npm install && npm run dev"
    ports:
      - '5173:5173'
    networks:
      - ccuss_network

  mysql:
    image: mysql:8
    container_name: ccuss_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ccuss
      MYSQL_USER: ccuss_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ccuss_network

networks:
  ccuss_network:

volumes:
  mysql_data:
