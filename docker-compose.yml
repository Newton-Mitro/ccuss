# version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/development/php/Dockerfile
    container_name: cfs_app
    restart: unless-stopped
    working_dir: /var/www/cfs
    volumes:
      - ./:/var/www/cfs
      - ./storage:/var/www/cfs/storage
      - ./bootstrap/cache:/var/www/cfs/bootstrap/cache
    environment:
      APP_ENV: local
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: cfs
      DB_USERNAME: cfs_user
      DB_PASSWORD: secret
      REDIS_HOST: redis
    depends_on:
      - mysql
      - redis
    networks:
      - cfs-network

  node:
    build:
      context: .
      dockerfile: docker/development/node/Dockerfile
    container_name: cfs_node
    restart: unless-stopped
    working_dir: /var/www/cfs
    volumes:
      - ./:/var/www/cfs
      - node_modules:/var/www/cfs/node_modules
    ports:
      - '5173:5173'
    networks:
      - cfs-network
    # command: sh -c "npm install && npm run dev"

  nginx:
    image: nginx:alpine
    container_name: cfs_nginx
    restart: unless-stopped
    ports:
      - '8000:80'
    volumes:
      - ./:/var/www/cfs
      - ./docker/development/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - cfs-network

  mysql:
    image: mysql:8.1
    container_name: cfs_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cfs
      MYSQL_USER: cfs_user
      MYSQL_PASSWORD: secret
    ports:
      - '3307:3306'
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - cfs-network

  redis:
    image: redis:alpine
    container_name: cfs_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - cfs-network

  scheduler:
    build:
      context: .
      dockerfile: docker/development/php/Dockerfile
    container_name: cfs_scheduler
    restart: unless-stopped
    working_dir: /var/www/cfs
    volumes:
      - ./:/var/www/cfs
    command: php artisan schedule:work
    depends_on:
      - mysql
      - redis
    networks:
      - cfs-network

  queue:
    build:
      context: .
      dockerfile: docker/development/php/Dockerfile
    container_name: cfs_queue
    restart: unless-stopped
    working_dir: /var/www/cfs
    volumes:
      - ./:/var/www/cfs
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90
    depends_on:
      - mysql
      - redis
    networks:
      - cfs-network

  horizon:
    build:
      context: .
      dockerfile: docker/development/php/Dockerfile
    container_name: cfs_horizon
    restart: unless-stopped
    working_dir: /var/www/cfs
    volumes:
      - ./:/var/www/cfs
    command: php artisan horizon
    depends_on:
      - redis
      - mysql
    networks:
      - cfs-network

networks:
  cfs-network:
    driver: bridge

volumes:
  db_data:
  node_modules:
