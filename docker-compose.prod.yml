version: '3.9'

services:
  # -------------------------------
  # Laravel PHP-FPM App
  # -------------------------------
  app:
    build:
      context: .
      dockerfile: docker/production/php/Dockerfile
    container_name: ccuss_prod_app
    restart: unless-stopped
    working_dir: /var/www/ccuss
    volumes:
      - ./.env.production:/var/www/ccuss/.env:ro
      - storage_data:/var/www/ccuss/storage
      - cache_data:/var/www/ccuss/bootstrap/cache
    environment:
      APP_ENV: 'production'
      APP_DEBUG: 'false'
      DB_HOST: 'mysql'
      DB_PORT: '3306'
      DB_DATABASE: 'ccuss'
      DB_USERNAME: 'ccuss_user'
      DB_PASSWORD: '${DB_PASSWORD}'
      REDIS_HOST: 'redis'
    depends_on:
      - mysql
      - redis
    networks:
      - ccuss-prod-network

  # -------------------------------
  # Nginx Web Server
  # -------------------------------
  nginx:
    image: nginx:alpine
    container_name: ccuss_prod_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/production/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - storage_data:/var/www/ccuss/storage
      - cache_data:/var/www/ccuss/bootstrap/cache
      - ./public:/var/www/ccuss/public:ro
    depends_on:
      - app
    networks:
      - ccuss-prod-network

  # -------------------------------
  # MySQL Database
  # -------------------------------
  mysql:
    image: mysql:8.1
    container_name: ccuss_prod_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD}'
      MYSQL_DATABASE: ccuss
      MYSQL_USER: ccuss_user
      MYSQL_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - ccuss-prod-network

  # -------------------------------
  # Redis Cache
  # -------------------------------
  redis:
    image: redis:alpine
    container_name: ccuss_prod_redis
    restart: unless-stopped
    networks:
      - ccuss-prod-network

  # -------------------------------
  # Laravel Scheduler
  # -------------------------------
  scheduler:
    build:
      context: .
      dockerfile: docker/production/php/Dockerfile
    container_name: ccuss_prod_scheduler
    restart: unless-stopped
    working_dir: /var/www/ccuss
    volumes:
      - storage_data:/var/www/ccuss/storage
      - cache_data:/var/www/ccuss/bootstrap/cache
    command: php artisan schedule:work
    depends_on:
      - mysql
      - redis
    networks:
      - ccuss-prod-network

  # -------------------------------
  # Laravel Queue Worker
  # -------------------------------
  queue:
    build:
      context: .
      dockerfile: docker/production/php/Dockerfile
    container_name: ccuss_prod_queue
    restart: unless-stopped
    working_dir: /var/www/ccuss
    volumes:
      - storage_data:/var/www/ccuss/storage
      - cache_data:/var/www/ccuss/bootstrap/cache
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90
    depends_on:
      - mysql
      - redis
    networks:
      - ccuss-prod-network

networks:
  ccuss-prod-network:
    driver: bridge

volumes:
  dbdata:
  storage_data:
  cache_data:
